upstream django {
    server django:8000;
}

server {
    listen 80;

    location /static/ {
        alias /app/backend/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
